services:
  backend:
    build: .
    ports:
      - "8000:80"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    command: >
      sh -c "alembic upgrade head && 
            uvicorn app.main:app --host 0.0.0.0 --port 80 --reload"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
